{% extends "base.html" %}  <!-- Your base template -->
{% load static %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 text-center">
    <div class="mb-6">
        <svg class="h-16 w-16 text-red-500 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <h1 class="text-2xl font-bold text-gray-800 mt-4">Too Many Requests</h1>
    </div>
    
    <p class="text-gray-600 mb-6">
        You've exceeded the rate limit. Please wait a moment before trying again.
    </p>
    
    <div class="text-sm text-gray-500 mb-8">
        <p>Error 429 - Rate Limit Exceeded</p>
        <p>Retry after: <span id="countdown">30</span> seconds</p>
    </div>
    
    <a href="{url 'dashboard'}" class="btn-primary inline-block px-6 py-2 rounded-md">
        Return Home
    </a>
</div>

<script>
    // Simple countdown timer
    let seconds = 30;
    const countdown = setInterval(() => {
        document.getElementById('countdown').textContent = --seconds;
        if (seconds <= 0) clearInterval(countdown);
    }, 1000);
</script>
{% endblock %}

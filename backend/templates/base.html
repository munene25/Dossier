<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% if messages %}
        {% for message in messages %}
            <p> {{ message }}</p>
        {% endfor %}
    {% endif %}
    <div>
        {% block body %}
        {% endblock %}
    </div>
</body>
</html>

<style>
    div{
       display: flex;
       justify-content: flex-start;
       gap: 2rem;
       margin: 2rem;
       font-size: x-large;
    }
</style>

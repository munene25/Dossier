{% extends 'base.html' %}

{% block body %}
<form method="post" action="{% url 'resumes:modify_personal_information' pk=resume_id %}">
    {% csrf_token %}
    <div>
        <input style="font-size: 2rem;" type="text" name="UserDefinedField" value="{{ user_defined_fields.PersonalInformation }}" >
    </div>
    <div>
        <label for="Name">Name</label>
        <input type="text" name="Name" value="{{ personal_information.Name }}">
    </div>
    <div>
        <label for="Phone">Phone</label>
        <input type="text" name="Phone" value="{{ personal_information.Phone }}">
    </div>
    <div>
        <label for="Email">E-mail</label>
        <input type="text" name="Email" value="{{ personal_information.Email }}">
    </div>
    <div>
        <label for="LinkedIn">LinekedIn</label>
        <input type="text" name="LinkedIn" value="{{ personal_information.LinkedIn }}">
    </div>
    <div>
        <label for="ExternalLink">External Link or Portfolio</label>
        <input type="text" name="ExternalLink" value="{{ personal_information.ExternalLink }}">
    </div>
    
    <button type="submit">Modify</button>

</form>


{% endblock %}

{% extends 'base.html' %}

{% block body %}
    <form method="post" enctype="multipart/form-data" action="{% url 'resumes:upload' %}">
        {% csrf_token %}
        <h1>Upload your File to get started!</h1>
        <div class="single-form">{{form}}</div>
        <button type="submit">Upload</button>
    </form>
{% endblock %}

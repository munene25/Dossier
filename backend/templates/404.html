{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 text-center">
    <div class="mb-6">
        <svg class="h-16 w-16 text-purple-500 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <h1 class="text-2xl font-bold text-gray-800 mt-4">Page Not Found</h1>
    </div>
    
    <p class="text-gray-600 mb-6">
        The page you're looking for doesn't exist or has been moved.
    </p>
    
    <div class="text-sm text-gray-500 mb-8">
        <p>Error 404 - Page Not Found</p>
        <p class="mt-2 text-xs break-all">{{ request_path }}</p>
    </div>
    
    <div class="flex justify-center gap-4">
        <a href="{% url 'dashboard' %}" class="btn-primary px-6 py-2 rounded-md">
            Return Home
        </a>
        <a href="javascript:history.back()" class="btn-secondary px-6 py-2 rounded-md">
            Go Back
        </a>
    </div>
</div>
{% endblock %}

{% extends 'dashboard.html' %}
{% load i18n %}

{% block content %}
<div class="max-w-1/2 mt-4 mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8">
    <!-- Confirmation Content -->
    <h1 class="text-2xl font-bold text-gray-800 mb-4">Confirm Email Address</h1>
    
    <div class="mb-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
        <p class="text-gray-700">
            Please confirm that <a href="mailto:{{ email }}" class="text-blue-600 font-medium">{{ email }}</a> 
            is an email address for user {{ user.username }}.
        </p>
    </div>

    <!-- Confirmation Form -->
    <form method="post" action="{{ request.path }}" class="text-center">
        {% csrf_token %}
        <button type="submit" class="btn-primary mx-auto w-fit flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500">
            Confirm Email
        </button>
    </form>
</div>
{% endblock %}
